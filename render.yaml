# Render service definition for ProjectX (backend only)
services:
  - type: web
    name: projectx-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        sync: false

# Notes:
# - On Render, set the actual values for MONGO_URI and JWT_SECRET in the service's Environment
#   settings (do NOT commit secrets to the repo).
# - If you later want to host the frontend on Render, add a static service or deploy it separately (Vercel is a good alternative).
